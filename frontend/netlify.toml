[build]
  publish = "dist"
  command = "npm run build"

# Proxy API requests to Render backend to bypass CORS
[[redirects]]
  from = "/api/*"
  to = "https://libora-ecommerce-website.onrender.com/api/:splat"
  status = 200
  force = true

# Client-side routing fallback (must be after the API proxy)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
